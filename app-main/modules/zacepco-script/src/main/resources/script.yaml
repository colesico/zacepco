#
# Script reference model
# Defines all possible fields with example values
#
meta:
  schema: 1.0.0
  uuid: 7f56fb1f-5f03-41ef-ae9c-4ef99fbcf7d9
  title: Script document
  annotation: >
    Defines the complete reference model of the script document
  authors:
    - Vladlen V. Larionov
  licence: CC BY 4.0
  created: 2026-01-01
  version: 1
  difficulty: 0
  estimatedTime: { min: 5, max: 60 }
  playersNum: { min: 1, max: 8 }

include:
  - uuid: 00000000-0000-0000-0000-000000000000
    alias: generic

setting:
  crimeDuration: 5

  personages:
    - id: P1
      name: Butler
      description: >
        Knows all the secrets and secret passages, 
        is cold-blooded, has the perfect motive for murder.
      reference:
        script: generic
        entity: P2
      hidden: true
      vars:
        varName: Any value
      revealedClues: [ C1, C2 ]
      log:
        - location: L2
          clue: C2
  scene:
    size: { cols: 2, rows: 3 }

    locations:
      - id: L1
        name: Cabinet
        description: >
          A gloomy study with dark shadows 
          shaped like Rorschach blots.
        reference:
          script: generic
          entity: L2
        pos: { col: 1, row: 1 }
        hidden: true
        vars:
          varName: Any value
        revealedClues: [ C1,C2 ]
        log:
          - personages: [ P1,P2 ]
            clues: [C1,C2]

    transitions:
      - from: L1
        to: L2
        hidden: true

  clues:
    - id: C1
      name: Butt
      description: >
        A Camel cigarette butt
      reference:
        script: generic
        entity: C4
      falsity: true
      vars:
        varName: $P1
      open: [ L2 ]

investigation:
  budget: 9
  randFactor: 1

  search:
    cost: 3
    points: 2
    focusLimit: 3
    statCost: -1
    locations:
      - location: L3
        clues:
          - focus: [ C3, P2, T2 ]
            threshold: 8.1
            clue: C1

  interrogation:
    cost: 4
    points: 3
    focusLimit: 3
    statCost: -1
    personages:
      - personage: P1
        clues:
          - focus: [ T2, P1, L3 ]
            threshold: 7.0
            clue: C2

  expertise:
    cost: 5
    points: 5
    focusLimit: 3
    statCost: -1
    clues:
      - focus: [ C1, C2, P3, L2 ]
        threshold: 3
        clue: C6

answers:
  fabula: >
    А было все так...
  strategy:
    - Search location L1
    - P2 Interrogation
